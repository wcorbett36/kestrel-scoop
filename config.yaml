output_dir: "./wiki"
# Use the same id the MLX server advertises in GET /v1/models (rolodex name alone is not a HF repo id).
llm_model: "openai/mlx-community/Qwen2.5-Coder-7B-Instruct-4bit"
# Map/reduce: one LLM call per file (and per segment if file exceeds max_chunk_chars), then merge to ProjectProfile.
chunk_repo_synthesis: true
# Omit to default 48000; set higher if your backend has a huge context window and you want fewer segments.
max_chunk_chars: 48000

projects:
  - name: "artemis_home"
    path: "../../artemis_home"
    focus: "Core steering systems and architecture"
    include: 
      - "README.md"
      - "**/*.md"
      
  - name: "kestrel-systems"
    path: "../../kestrel-systems"
    focus: "Workflow tooling, local testing tools, edge gateways"
    include: 
      - "README.md"
      - "**/*.md"

  - name: "repo_strategy"
    path: "../../repo_strategy"
    focus: "DecisionOps strategy, tracking, and rationalization logic"
    include: 
      - "README.md"
      - "**/*.md"

  - name: "trust-systems"
    path: "../../trust-systems"
    focus: "Policy, constraints, security, OPA layers"
    include: 
      - "README.md"
      - "**/*.md"
